<!DOCTYPE html>
<html lang="tr">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Hidayet Saygı</title>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container"><a class="navbar-brand">Hidayet Saygı Ahşap</a></div>
    </nav>
    
    <div class="container mt-5">
        <h2 id="hakkimizda">Hakkımızda</h2>
        <p>{{ ayarlar.get('hakkimizda', 'Buraya açıklama gelecek.') }}</p>
        
        <h2 id="urunler" class="mt-5">Ürünlerimiz</h2>
        <div class="row">
            {% for u in urunler %}
            <div class="col-md-4"><div class="card"><img src="{{ u[3] }}" class="card-img-top"><div class="card-body"><h5>{{ u[1] }}</h5></div></div></div>
            {% endfor %}
        </div>
    </div>
    
    <a href="https://wa.me/{{ ayarlar.get('whatsapp', '905000000000') }}" 
       style="position:fixed; bottom:20px; right:20px; background:#25D366; color:white; padding:15px; border-radius:50px; text-decoration:none;">WhatsApp</a>
</body>
</html>
