<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Profesyonel Yönetim Paneli</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm p-4 mb-4 bg-white d-flex flex-row justify-content-between align-items-center">
            <h2 class="mb-0"><span class="text-primary fw-bold">Yönetim</span> Paneli</h2>
            <a href="/logout" class="btn btn-danger px-4">Güvenli Çıkış</a>
        </div>
        
        <div class="row">
            <!-- Genel Ayarlar -->
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm p-4 bg-white h-100">
                    <h4 class="mb-4 fw-bold">Site Bilgileri</h4>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Site Başlığı</label>
                            <input type="text" name="baslik" class="form-control" value="{{ ayarlar.get('baslik', '') }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Logo Linki</label>
                            <input type="file" class="form-control mb-1" onchange="upload(this, 'logo_url')">
                            <input type="text" name="logo_url" id="logo_url" class="form-control" value="{{ ayarlar.get('logo_url', '') }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Kapak Resmi</label>
                            <input type="file" class="form-control mb-1" onchange="upload(this, 'kapak_url')">
                            <input type="text" name="kapak_url" id="kapak_url" class="form-control" value="{{ ayarlar.get('kapak_url', '') }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">WhatsApp No (Örn: 905xxxxxxxxx)</label>
                            <input type="text" name="whatsapp_no" class="form-control" value="{{ ayarlar.get('whatsapp_no', '') }}">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Ayarları Kaydet</button>
                    </form>
                </div>
            </div>

            <!-- Ürün Yönetimi -->
            <div class="col-md-6">
                <div class="card shadow-sm p-4 bg-white mb-4">
                    <h4 class="mb-4 fw-bold">Yeni Ürün Ekle</h4>
                    <form method="POST">
                        <input type="hidden" name="islem" value="urun_ekle">
                        <input type="text" name="urun_adi" class="form-control mb-2" placeholder="Ürün Adı" required>
                        <textarea name="urun_detay" class="form-control mb-2" placeholder="Detaylar"></textarea>
                        <input type="file" class="form-control mb-2" onchange="upload(this, 'urun_gorsel')">
                        <input type="text" name="urun_gorsel" id="urun_gorsel" class="form-control mb-2" placeholder="Resim Linki">
                        <button type="submit" class="btn btn-success w-100">Ürünü Ekle</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Güçlü Resim Yükleme Motoru -->
    <script>
        async function upload(input, targetId) {
            const file = input.files[0];
            if (!file) return;
            const target = document.getElementById(targetId);
            target.value = "Yükleniyor...";
            
            const formData = new FormData();
            formData.append("image", file);
            
            try {
                const response = await fetch("https://api.imgbb.com/1/upload?key=6701fccbd3e00be64303d3ee3dd8f78d", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                if(data.success) {
                    target.value = data.data.url;
                } else {
                    alert("Resim yüklenemedi!");
                    target.value = "";
                }
            } catch (err) {
                alert("Sistem hatası: " + err);
                target.value = "";
            }
        }
    </script>
</body>
</html>
