<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönetici Girişi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow-lg" style="width: 380px;">
        <h3 class="text-center mb-4 fw-bold">Yönetici Girişi</h3>
        {% if hata %}
            <div class="alert alert-danger text-center py-2">{{ hata }}</div>
        {% endif %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Kullanıcı Adı</label>
                <input type="text" name="kullanici" class="form-control" placeholder="admin" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Şifre</label>
                <input type="password" name="sifre" class="form-control" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Sisteme Giriş Yap</button>
        </form>
        <div class="text-center mt-3">
            <a href="/" class="text-decoration-none text-muted small">← Siteye Geri Dön</a>
        </div>
    </div>
</body>
</html>
